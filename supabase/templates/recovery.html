<!doctype html>
<html lang="th">
  <body style="margin:0;background:#f5f5f4;font-family:Arial,sans-serif;color:#1c1917">
    <div style="max-width:560px;margin:0 auto;padding:40px 20px">
      <div style="background:#ffffff;border-radius:20px;padding:32px">
        <h1 style="margin:0 0 12px;font-size:28px">ตั้งรหัสผ่านใหม่</h1>
        <p style="margin:0 0 24px;line-height:1.7;color:#57534e">
          เราได้รับคำขอรีเซ็ตรหัสผ่านผู้ดูแล Nimman Foto กดปุ่มด้านล่างเพื่อตั้งรหัสผ่านใหม่ ลิงก์นี้ใช้ได้ครั้งเดียวและมีอายุจำกัด
        </p>
        <a
          href="{{ .RedirectTo }}/login/update-password#token_hash={{ .TokenHash }}&amp;type=recovery"
          style="display:inline-block;border-radius:999px;background:#1c1917;padding:14px 24px;color:#ffffff;text-decoration:none;font-weight:700"
        >
          ตั้งรหัสผ่านใหม่
        </a>
        <p style="margin:24px 0 0;font-size:13px;line-height:1.6;color:#78716c">
          หากคุณไม่ได้เป็นผู้ขอ สามารถละเว้นอีเมลนี้ได้
        </p>
      </div>
    </div>
  </body>
</html>
