name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      RATE_LIMIT_HASH_SECRET: ci-rate-limit-secret-with-at-least-32-bytes
      CRON_SECRET: ci-cron-secret-with-at-least-32-bytes
      CUSTOMER_DATA_RETENTION_DAYS: "365"

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Start local Supabase and verify migrations
        run: |
          npx --yes supabase@2.109.1 start
          npx --yes supabase@2.109.1 db reset
          eval "$(npx --yes supabase@2.109.1 status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "RUN_SUPABASE_INTEGRATION=1" >> "$GITHUB_ENV"
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run test:integration
      - run: npx --yes supabase@2.109.1 db lint --local --level warning --fail-on error
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          RUN_E2E: "1"
      - run: npm audit --omit=dev --audit-level=high
